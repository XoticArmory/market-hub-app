kind = "web"
previewPath = "/"
title = "VendorGrid"
version = "1.0.0"
id = "artifacts/vendorgrid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23231

[services.development]
run = "pnpm --filter @workspace/vendorgrid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendorgrid", "run", "build" ]
publicDir = "artifacts/vendorgrid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23231"
BASE_PATH = "/"
